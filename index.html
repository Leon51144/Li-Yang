<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蜜蜂授粉遊戲</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── 遊戲主容器 ── */
    #game {
      position: relative;
      width: 900px;
      height: 506px;
      overflow: hidden;
    }

    /* ── 背景 ── */
    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* 如果bg.png不存在，用漸層代替 */
    #game.no-bg {
      background: linear-gradient(
        180deg,
        #a8dce8 0%,
        #b8e6d0 45%,
        #7ec87a 75%,
        #5aab56 100%
      );
    }

    /* ── 所有精靈 (sprite) 共用 ── */
    .sprite {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    /* ── 裝飾元素（位置由 JS 控制，無浮動動畫） ── */
    #berry     { width: 60px; z-index: 3; }
    #dragonfly { width: 72px; z-index: 3; }
    #bird      { width: 70px; z-index: 3; }
    #mangosteen{ width: 60px; z-index: 3; }
    #scallion  { width: 55px; z-index: 3; }
    #pepper    { width: 55px; z-index: 3; }

    /* ── 二朵花（目標），位置由 JS 控制 ── */
    #flower-pink {
      width: 80px;
      z-index: 4;
      transition: transform 0.25s;
    }
    #flower-red {
      width: 80px;
      z-index: 4;
      transition: transform 0.25s;
    }

    /* ── OK 標記 ── */
    .ok-img {
      width: 50px;
      z-index: 6;
      display: none;
      pointer-events: none;
    }

    /* 花被授粉時的效果 */
    .pollinated {
      animation: popFlower 0.5s ease;
    }

    /* ── 蜜蜂（玩家） ── */
    #bee-wrap {
      position: absolute;
      width: 65px;
      height: 65px;
      left: 30px;
      top: 220px;
      z-index: 10;
    }

    #bee-inner {
      width: 100%;
      height: 100%;
    }

    #bee-inner img {
      pointer-events: none;
      user-select: none;
      width: 100%;
      height: 100%;
      display: block;
    }



    /* ── 方向鍵（左下角，十字排列，獨立區塊） ── */
    #arrows {
      position: absolute;
      bottom: 18px;
      left: 18px;
      z-index: 20;
      width: 132px;
      height: 132px;
      display: grid;
      grid-template-columns: 44px 44px 44px;
      grid-template-rows: 44px 44px 44px;
      grid-template-areas:
        ".    up   ."
        "left .    right"
        ".    down .";
    }

    .arr-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: transform 0.1s, opacity 0.1s;
    }
    .arr-btn:active  { transform: scale(0.82); opacity: 0.75; }
    .arr-btn:hover   { opacity: 0.85; }

    .arr-btn img {
      width: 38px;
      height: 38px;
      pointer-events: none;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
    }

    #btn-up    { grid-area: up;    }
    #btn-left  { grid-area: left;  }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down;  }

    /* 旋轉箭頭方向 */
    #btn-up    img { transform: rotate(-90deg); }
    #btn-left  img { transform: rotate(180deg); }
    #btn-down  img { transform: rotate(90deg);  }

    /* ── 勝利畫面 ── */
    #win {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      gap: 14px;
    }
    #win h1 {
      font-family: Arial, sans-serif;
      font-size: 52px;
      color: #ffe066;
      text-shadow: 0 3px 16px rgba(0,0,0,0.5);
      animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    #win p  { font-family: Arial, sans-serif; font-size: 20px; color: #fff; }
    #btn-restart {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 32px;
      background: linear-gradient(135deg, #fdd835, #f5a623);
      color: #fff;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(245,166,35,0.5);
      transition: transform 0.1s;
    }
    #btn-restart:hover { transform: scale(1.05); }

    /* ── Animations ── */
    @keyframes popFlower {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.35); filter: brightness(1.7) saturate(1.8); }
      65%  { transform: scale(0.9); }
      100% { transform: scale(1); filter: none; }
    }
    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
<div id="game">

  <!-- ── 音效 ── -->
  <audio id="snd-click" src="click.mp3"   preload="auto"></audio>
  <audio id="snd-error" src="errorse.mp3" preload="auto"></audio>
  <audio id="snd-right" src="rightse.mp3" preload="auto"></audio>
  <audio id="snd-win"   src="winse.mp3"   preload="auto"></audio>

  <!-- 背景圖 -->
  <img id="bg" src="bg.png" alt="背景"
    onerror="document.getElementById('game').classList.add('no-bg'); this.style.display='none';" />

  <!-- ── 裝飾性物件（位置由 JS 隨機設定） ── -->
  <img class="sprite" id="dragonfly"  src="dragonfly.png"   alt="蜻蜓"   />
  <img class="sprite" id="bird"       src="Bird.png"        alt="鳥"     />

  <!-- 速度加成（吃到變快） -->
  <img class="sprite" id="berry"      src="berry.png"        alt="草莓"   />
  <img class="sprite" id="mangosteen" src="Mangosteen-3.png" alt="山竹"   />

  <!-- 速度懲罰（吃到變慢） -->
  <img class="sprite" id="scallion"   src="scallion.png"     alt="蔥"     />
  <img class="sprite" id="pepper"     src="pepper.png"       alt="辣椒"   />

  <!-- ── 兩朵花（授粉目標，位置由 JS 隨機設定） ── -->
  <img class="sprite" id="flower-pink" src="flower1.png"  alt="粉花" />
  <img class="sprite" id="flower-red"  src="Flower-4.png" alt="紅花" />

  <!-- ── OK 標記 ── -->
  <img class="sprite ok-img" id="ok-pink" src="ok.png" alt="OK" />
  <img class="sprite ok-img" id="ok-red"  src="ok.png" alt="OK" />

  <!-- ── 蜜蜂（玩家） ── -->
  <div id="bee-wrap">
    <div id="bee-inner">
      <img src="bee.png" alt="蜜蜂" id="bee-img" />
    </div>
  </div>


  <!-- ── 方向鍵（十字排列，左下角獨立） ── -->
  <div id="arrows">
    <button class="arr-btn" id="btn-up"    title="上" onclick="playSound('click'); move(0,-1)">
      <img src="arrow.png" alt="上" />
    </button>
    <button class="arr-btn" id="btn-left"  title="左" onclick="playSound('click'); move(-1,0)">
      <img src="arrow.png" alt="左" />
    </button>
    <button class="arr-btn" id="btn-right" title="右" onclick="playSound('click'); move(1,0)">
      <img src="arrow.png" alt="右" />
    </button>
    <button class="arr-btn" id="btn-down"  title="下" onclick="playSound('click'); move(0,1)">
      <img src="arrow.png" alt="下" />
    </button>
  </div>

  <!-- ── 勝利畫面 ── -->
  <div id="win">
    <h1>🎉 成功授粉！</h1>
    <p id="win-msg">蜜蜂完成了授粉任務！</p>
    <button id="btn-restart" onclick="restart()">再玩一次 🐝</button>
  </div>

</div>

<script>
/* =========================================================
   GAME CONFIG
   ========================================================= */
const GW   = 900;   // game width
const GH   = 506;   // game height
const BEES = 65;    // bee sprite size
const BASE_STEP = 20;    // base pixels per move

// Speed modifiers
const SPEED_NORMAL = 1.0;
const SPEED_SLOW   = 0.45;
const SPEED_FAST   = 1.35;
const SPEED_DURATION = 5000;  // ms duration for speed effect

// Flower size
const FLOWER_W = 80;
const FLOWER_H = 80;

// Decorative/obstacle sizes (approximate)
const ITEM_SIZE = 65;

// Forbidden zone for bee start (left side)
const BEE_START_X = 30;
const BEE_START_Y = GH / 2 - BEES / 2;

// Hit radii
const HIT_R        = 60;  // flower collision radius
const ANIMAL_HIT_R = 42;  // obstacle/powerup collision radius

/* =========================================================
   STATE
   ========================================================= */
let bx = BEE_START_X, by = BEE_START_Y;
let flowerVisited = { pink: false, red: false };
let won           = false;
let errorCooldown = false;
let speedMult     = SPEED_NORMAL;
let speedTimer    = null;

// Positions for flowers and items (set randomly on init/restart)
let flowerPos  = { pink: {x:0,y:0}, red: {x:0,y:0} };
let itemPos    = {};   // keyed by item id

/* =========================================================
   REFS
   ========================================================= */
const beeWrap   = document.getElementById('bee-wrap');
const beeImg    = document.getElementById('bee-img');
const winEl     = document.getElementById('win');
const winMsg    = document.getElementById('win-msg');
const fpink     = document.getElementById('flower-pink');
const fred      = document.getElementById('flower-red');
const okPink    = document.getElementById('ok-pink');
const okRed     = document.getElementById('ok-red');


/* =========================================================
   RANDOM POSITION HELPERS
   ========================================================= */

/**
 * Returns a random integer in [min, max].
 */
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/**
 * Check if two rectangles (with some padding) overlap.
 * a, b: {x, y, w, h}
 * pad: minimum gap between them
 */
function rectsOverlap(a, b, pad = 30) {
  return !(
    a.x + a.w + pad < b.x ||
    b.x + b.w + pad < a.x ||
    a.y + a.h + pad < b.y ||
    b.y + b.h + pad < a.y
  );
}

/**
 * Place all random items without overlapping each other or the bee start area.
 * Returns { pink, red, berry, mangosteen, scallion, pepper, dragonfly, bird }
 *   each with { x, y, w, h }
 */
function randomizePositions() {
  const margin = 10;
  // Exclude left 120px (bee start zone + arrow pad) and bottom 160px (arrows)
  const xMin = 120, xMax = GW - ITEM_SIZE - margin;
  const yMin = margin, yMax = GH - ITEM_SIZE - 160;

  const placed = [];

  // Bee start zone as a forbidden rect
  placed.push({ x: 0, y: 0, w: 130, h: GH });

  function placeItem(w, h, attempts = 200) {
    for (let i = 0; i < attempts; i++) {
      const x = randInt(xMin, xMax);
      const y = randInt(yMin, yMax);
      const rect = { x, y, w, h };
      if (!placed.some(p => rectsOverlap(rect, p, 25))) {
        placed.push(rect);
        return { x, y };
      }
    }
    // Fallback: just use the last attempted position
    const x = randInt(xMin, xMax);
    const y = randInt(yMin, yMax);
    placed.push({ x, y, w, h });
    return { x, y };
  }

  // 兩朵花需要保持足夠距離（中心距 >= 300px）
  const MIN_FLOWER_DIST = 300;
  let pink, red;
  for (let attempt = 0; attempt < 50; attempt++) {
    // 每次從頭試，不保留上次失敗的佔位
    const savedLen = placed.length;
    pink = placeItem(FLOWER_W, FLOWER_H);
    red  = placeItem(FLOWER_W, FLOWER_H);
    const dx = (pink.x + FLOWER_W/2) - (red.x + FLOWER_W/2);
    const dy = (pink.y + FLOWER_H/2) - (red.y + FLOWER_H/2);
    if (Math.hypot(dx, dy) >= MIN_FLOWER_DIST) break;
    // 距離不足，移除這兩筆佔位再重試
    placed.splice(savedLen, placed.length - savedLen);
  }
  const berry      = placeItem(60, 60);
  const mangosteen = placeItem(60, 60);
  const scallion   = placeItem(55, 55);
  const pepper     = placeItem(55, 55);
  const dragonfly  = placeItem(72, 72);
  const bird        = placeItem(70, 70);

  return { pink, red, berry, mangosteen, scallion, pepper, dragonfly, bird };
}

/**
 * Apply positions to DOM elements.
 */
function applyPositions(pos) {
  flowerPos.pink = pos.pink;
  flowerPos.red  = pos.red;

  fpink.style.left = pos.pink.x + 'px';
  fpink.style.top  = pos.pink.y + 'px';
  fred.style.left  = pos.red.x  + 'px';
  fred.style.top   = pos.red.y  + 'px';

  // Position OK images slightly above/centered on flowers
  okPink.style.left = (pos.pink.x + 15) + 'px';
  okPink.style.top  = (pos.pink.y - 30) + 'px';
  okRed.style.left  = (pos.red.x + 15) + 'px';
  okRed.style.top   = (pos.red.y - 30) + 'px';

  const items = ['berry', 'mangosteen', 'scallion', 'pepper', 'dragonfly', 'bird'];
  items.forEach(id => {
    const el = document.getElementById(id);
    el.style.left = pos[id].x + 'px';
    el.style.top  = pos[id].y + 'px';
    itemPos[id] = pos[id];
  });
}

/* =========================================================
   SOUND
   ========================================================= */
function playSound(name) {
  const map = {
    click: 'snd-click',
    error: 'snd-error',
    right: 'snd-right',
    win:   'snd-win'
  };
  const el = document.getElementById(map[name]);
  if (!el) return;
  el.currentTime = 0;
  el.play().catch(() => {});
}

/* =========================================================
   SPEED SYSTEM
   ========================================================= */
function setSpeed(mult) {
  speedMult = mult;

  if (speedTimer) clearTimeout(speedTimer);

  if (mult !== SPEED_NORMAL) {
    speedTimer = setTimeout(() => {
      speedMult = SPEED_NORMAL;
      speedTimer = null;
    }, SPEED_DURATION);
  }
}

/* =========================================================
   RENDER BEE
   ========================================================= */
function renderBee() {
  beeWrap.style.left = bx + 'px';
  beeWrap.style.top  = by + 'px';
}

/* =========================================================
   MOVE
   ========================================================= */
function move(dx, dy) {
  if (won) return;

  // Flip bee horizontally when moving left
  if (dx < 0) beeImg.style.transform = 'scaleX(-1)';
  if (dx > 0) beeImg.style.transform = 'scaleX(1)';

  const step = Math.round(BASE_STEP * speedMult);
  bx = Math.max(0, Math.min(GW - BEES, bx + dx * step));
  by = Math.max(0, Math.min(GH - BEES - 10, by + dy * step));

  beeWrap.style.left = bx + 'px';
  beeWrap.style.top  = by + 'px';

  checkCollision();
}

/* =========================================================
   COLLISION
   ========================================================= */
function dist(ax, ay, bx2, by2) {
  return Math.hypot(ax - bx2, ay - by2);
}

function beeCX() { return bx + BEES / 2; }
function beeCY() { return by + BEES / 2; }

// Get the centre of an item from its stored position + size
function itemCX(id, w) { return itemPos[id].x + w / 2; }
function itemCY(id, h) { return itemPos[id].y + h / 2; }

function checkCollision() {
  const cx = beeCX(), cy = beeCY();

  // ── 花朵碰撞 ──
  if (!flowerVisited.pink &&
      dist(cx, cy, flowerPos.pink.x + FLOWER_W/2, flowerPos.pink.y + FLOWER_H/2) < HIT_R) {
    visitFlower('pink'); return;
  }
  if (!flowerVisited.red &&
      dist(cx, cy, flowerPos.red.x + FLOWER_W/2, flowerPos.red.y + FLOWER_H/2) < HIT_R) {
    visitFlower('red'); return;
  }

  // ── 速度加成：berry / mangosteen ──
  const speedBoostItems = [
    { id: 'berry',      w: 60, h: 60 },
    { id: 'mangosteen', w: 60, h: 60 },
  ];
  for (const item of speedBoostItems) {
    if (!itemPos[item.id]) continue;
    if (dist(cx, cy, itemCX(item.id, item.w), itemCY(item.id, item.h)) < ANIMAL_HIT_R) {
      if (speedMult !== SPEED_FAST) setSpeed(SPEED_FAST);
      return;
    }
  }

  // ── 速度懲罰：scallion / pepper ──
  const speedSlowItems = [
    { id: 'scallion', w: 55, h: 55 },
    { id: 'pepper',   w: 55, h: 55 },
  ];
  for (const item of speedSlowItems) {
    if (!itemPos[item.id]) continue;
    if (dist(cx, cy, itemCX(item.id, item.w), itemCY(item.id, item.h)) < ANIMAL_HIT_R) {
      if (speedMult !== SPEED_SLOW) setSpeed(SPEED_SLOW);
      return;
    }
  }

  // ── 障礙碰撞：dragonfly / bird → 送回原點 ──
  const obstacles = [
    { id: 'dragonfly', w: 72, h: 72 },
    { id: 'bird',      w: 70, h: 70 },
  ];
  for (const obs of obstacles) {
    if (!itemPos[obs.id]) continue;
    const ocx = itemCX(obs.id, obs.w);
    const ocy = itemCY(obs.id, obs.h);
    if (dist(cx, cy, ocx, ocy) < ANIMAL_HIT_R && !errorCooldown) {
      playSound('error');
      errorCooldown = true;
      resetBeeToStart();
      setTimeout(() => { errorCooldown = false; }, 1200);
      break;
    }
  }
}

function resetBeeToStart() {
  bx = BEE_START_X;
  by = BEE_START_Y;
  beeWrap.style.left = bx + 'px';
  beeWrap.style.top  = by + 'px';
  beeImg.style.transform = 'scaleX(1)';

  // Flash animation
  let flashes = 0;
  const flashTimer = setInterval(() => {
    beeWrap.style.opacity = flashes % 2 === 0 ? '0.2' : '1';
    flashes++;
    if (flashes >= 8) {
      clearInterval(flashTimer);
      beeWrap.style.opacity = '1';
    }
  }, 120);
}

/* 授粉某朵花 */
function visitFlower(flower) {
  flowerVisited[flower] = true;
  playSound('right');

  const el = flower === 'pink' ? fpink : fred;
  const ok = flower === 'pink' ? okPink : okRed;
  
  el.classList.remove('pollinated');
  void el.offsetWidth;
  el.classList.add('pollinated');
  
  // 顯示 OK 圖片
  ok.style.display = 'block';

  setTimeout(() => {
    el.classList.remove('pollinated');
    el.style.filter = 'brightness(0.65) saturate(0.4)';
  }, 500);

  if (flowerVisited.pink && flowerVisited.red) {
    setTimeout(() => triggerWin(), 600);
  }
}

function triggerWin() {
  won = true;
  playSound('win');
  winMsg.textContent = '太厲害了！兩朵花都授粉完成！🌻';
  winEl.style.display = 'flex';
}

function restart() {
  bx = BEE_START_X;
  by = BEE_START_Y;
  flowerVisited = { pink: false, red: false };
  won           = false;
  errorCooldown = false;

  // Reset speed
  if (speedTimer) { clearTimeout(speedTimer); speedTimer = null; }
  speedMult = SPEED_NORMAL;

  beeImg.style.transform = 'scaleX(1)';
  fpink.style.filter = '';
  fred.style.filter  = '';
  okPink.style.display = 'none';
  okRed.style.display = 'none';
  winEl.style.display = 'none';

  beeWrap.style.left = bx + 'px';
  beeWrap.style.top  = by + 'px';

  // Re-randomize positions every restart
  applyPositions(randomizePositions());
}

/* =========================================================
   KEYBOARD
   ========================================================= */
const held = {};
document.addEventListener('keydown', e => {
  if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
  e.preventDefault();
  if (!held[e.key]) playSound('click');
  held[e.key] = true;
});
document.addEventListener('keyup', e => { held[e.key] = false; });

// continuous movement loop
setInterval(() => {
  if (won) return;
  if (held['ArrowUp'])    move( 0,-1);
  if (held['ArrowDown'])  move( 0, 1);
  if (held['ArrowLeft'])  move(-1, 0);
  if (held['ArrowRight']) move( 1, 0);
}, 60);

/* =========================================================
   INIT
   ========================================================= */
beeWrap.style.left      = bx + 'px';
beeWrap.style.top       = by + 'px';
beeWrap.style.transform = '';

// Initial random placement
applyPositions(randomizePositions());
</script>
</body>
</html>
